<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather app</title>
    <link rel="stylesheet" href="style.css"><link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Dancing+Script:wght@400..700&family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button><img src="images/magnifiying-glass.png"></button>
        </div>
        <div class="weather">
            <img src="images/partly-cloudy.png" class="weather-icon">
            <h1 class="temp">22°c</h1>
            <h2 class="city">new delhi</h2>
            <div class="details">
                <div class="col">
                    <img src="images/weather (1).png" class="img-humi">
                    <div>
                        <p class="humidity">80%</p>
                        <p>Humudity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind (1).png" class="img-humi">
                    <div>
                        <p class="wind">18 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "7560dc130e83bf4815693a3fdd8b915c";
const apiUrl = "https://api.openweathermap.org/data/2.5/weather?q";

const searchBox = document.querySelector(".search input");
const searchBtn = document.querySelector(".search button");
const weatherIcon = document.querySelector(".weather-icon");

async function checkWeather(city){
    const response = await fetch(apiUrl + city + `&appid=${apiKey}`);
    var data= await response.json();
    console.log(data);

    document.querySelector(".city").innerHTML = data.name;
    document.querySelector(".temp").innerHTML = Math.round(data.main.temp) + "°c";
    document.querySelector(".humidity").innerHTML = data.main.humidity + " %";
    document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";

    if(data.weather[0].main == "Clouds"){
        weatherIcon.src = "images/partly-cloudy.png"
    }
    else if(data.weather[0].main == "Rain"){
        weatherIcon.src = "images/rain.png"
    }
    else if (data.weather[0].main == "Clear"){
        weatherIcon.src = "images/sun.png"
    }
    else if (data.weather[0].main == "Drizzle"){
        weatherIcon.src = "images/cloudy.png"
    }
    else if(data.weather[0].main == "Mist"){
        weatherIcon.src = "images/foggy-day.png"
    }

    documen.querySelector(".weather").style.display = "block"
}

searchBtn.addEventListener("click", () => {

    if(searchBox.value === ""){
        alert("Please enter a city name");
        return;
    }

    checkWeather(searchBox.value);
});
    </script>
</body>
</html>
