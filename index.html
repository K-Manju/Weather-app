<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather app</title>
    <link rel="stylesheet" href="style.css"><link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Dancing+Script:wght@400..700&family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <div class="card">
        <div class="search">
            <input type="text" placeholder="Enter city name" spellcheck="false">
            <button><img src="images/magnifiying-glass.png"></button>
        </div>
        <div class="weather">
            <img src="images/weather.png" class="weather-icon">
            <h1 class="temp">22°c</h1>
            <h2 class="city">new delhi</h2>
            <div class="details">
                <div class="col">
                    <img src="images/weather (1).png" class="img-humi">
                    <div>
                        <p class="humidity">80%</p>
                        <p>Humudity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind (1).png" class="img-humi">
                    <div>
                        <p class="wind">18 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
